<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Plan</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-soft: #1f6feb33;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --code-bg: #161b22;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }
    h1 {
      margin: 0 0 0.25rem;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .meta {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    h2 {
      margin: 2.5rem 0 1rem;
      font-size: 1.3rem;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.4rem;
      color: var(--text);
    }
    h3 {
      margin: 1.5rem 0 0.5rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }
    p { margin: 0.6rem 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
    }

    .phase {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .phase-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .phase-title {
      font-weight: 600;
      font-size: 1.05rem;
    }
    .phase-duration {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    .phase-meta {
      margin-top: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .phase-deliverables {
      margin-top: 0.75rem;
    }
    .phase-deliverables ul {
      margin: 0.3rem 0 0;
      padding-left: 1.2rem;
    }

    .component-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
    }
    .component-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
    }
    .component-card h4 {
      margin: 0 0 0.4rem;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .component-card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .diagram {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre;
      color: var(--text-secondary);
    }

    .code-block {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin: 1rem 0;
    }
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface-2);
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }
    .code-header .lang { font-weight: 600; text-transform: uppercase; font-size: 0.7rem; }
    pre {
      margin: 0;
      padding: 0.75rem 1rem;
      overflow-x: auto;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85rem;
    }

    .risk-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .risk-table th, .risk-table td {
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .risk-table th {
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge-high { background: #f8514922; color: var(--danger); border: 1px solid #f8514944; }
    .badge-medium { background: #d2992222; color: var(--warning); border: 1px solid #d2992244; }
    .badge-low { background: #3fb95022; color: var(--success); border: 1px solid #3fb95044; }

    .criteria-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .criteria-list li {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
    }
    .criteria-list li::before {
      content: "✓";
      color: var(--success);
      font-weight: 700;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      .container { padding: 1rem 1rem 3rem; }
      h1 { font-size: 1.5rem; }
      .component-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- TITLE & METADATA -->
    <header>
      <h1><!-- PROJECT NAME --></h1>
      <div class="meta"><!-- Date &middot; Author &middot; Version --></div>
    </header>

    <!-- EXECUTIVE SUMMARY -->
    <section id="summary">
      <h2>Executive Summary</h2>
      <div class="summary">
        <!-- 3-5 sentences on goal, scope, and expected outcome -->
      </div>
    </section>

    <!-- PHASES / TIMELINE -->
    <section id="phases">
      <h2>Phases</h2>
      <!-- Repeat .phase for each phase -->
      <div class="phase">
        <div class="phase-header">
          <span class="phase-title"><!-- Phase N: Title --></span>
          <span class="phase-duration"><!-- Duration --></span>
        </div>
        <p><!-- Objective --></p>
        <div class="phase-meta">Dependencies: <!-- prior phases or none --></div>
        <div class="phase-deliverables">
          <strong>Deliverables:</strong>
          <ul>
            <li><!-- Deliverable --></li>
          </ul>
        </div>
      </div>
    </section>

    <!-- ARCHITECTURE & COMPONENTS -->
    <section id="architecture">
      <h2>Architecture</h2>
      <!-- Text description of system structure -->

      <!-- Optional ASCII / text diagram -->
      <div class="diagram">
<!--
  [Component A]  →  [Component B]  →  [Component C]
       ↓                  ↓
  [Data Store]      [External API]
-->
      </div>

      <h3>Components</h3>
      <div class="component-grid">
        <!-- Repeat for each component -->
        <div class="component-card">
          <h4><!-- Component Name --></h4>
          <p><!-- Responsibility, tech, interface notes --></p>
        </div>
      </div>
    </section>

    <!-- CODE EXCERPTS & MOCK-UPS -->
    <section id="code">
      <h2>Code & Mock-ups</h2>
      <!-- Repeat .code-block for each excerpt -->
      <div class="code-block">
        <div class="code-header">
          <span class="lang"><!-- language --></span>
          <span><!-- filename or context --></span>
        </div>
        <pre><code><!-- code --></code></pre>
      </div>
    </section>

    <!-- DEPENDENCIES & RISKS -->
    <section id="risks">
      <h2>Dependencies & Risks</h2>
      <table class="risk-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Type</th>
            <th>Severity</th>
            <th>Mitigation</th>
          </tr>
        </thead>
        <tbody>
          <!-- Repeat for each risk/dependency -->
          <tr>
            <td><!-- Name --></td>
            <td><!-- Risk / Dependency --></td>
            <td><span class="badge badge-high">High</span></td>
            <td><!-- Mitigation or owner --></td>
          </tr>
        </tbody>
      </table>
    </section>

    <!-- SUCCESS CRITERIA -->
    <section id="success">
      <h2>Success Criteria</h2>
      <ul class="criteria-list">
        <!-- Repeat for each criterion -->
        <li><!-- Measurable outcome with threshold --></li>
      </ul>
    </section>

  </div>
</body>
</html>

<!-- Verified: zero external dependencies. Safe for file:// rendering. -->
